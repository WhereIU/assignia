name: CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v3
      - name: Create .env.ci from secret
        run: echo "${{ secrets.ENV_FILE_CI }}" > .env.ci
      - name: Run tests with docker compose
        run: |
          docker compose -f docker-compose.ci.yml up --abort-on-container-exit --exit-code-from web
      - name: Clean up
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: cd
    if: github.ref == 'refs/heads/main'
    env:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    steps:
      - uses: actions/checkout@v3

      - name: Create inventory from secret
        run: |
          mkdir -p ansible
          cat > ansible/hosts.ini <<EOF
          [assignia_server]
          ${{ secrets.ANSIBLE_HOSTS }}
          EOF
          echo "=== Inventory content ==="
          cat ansible/hosts.ini

      - name: Run Ansible playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: ansible/deploy.yml
          inventory: ansible/hosts.ini
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --extra-vars "deploy_method=copy"
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_PROD }}
          SSL_ONLINE_FULLCHAIN: ${{ secrets.SSL_ONLINE_FULLCHAIN }}
          SSL_ONLINE_KEY: ${{ secrets.SSL_ONLINE_KEY }}
          SSL_RU_FULLCHAIN: ${{ secrets.SSL_RU_FULLCHAIN }}
          SSL_RU_KEY: ${{ secrets.SSL_RU_KEY }}