name: CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v3
      - name: Create .env.ci from secret
        run: echo "${{ secrets.ENV_FILE_CI }}" > .env.ci
      - name: Run tests with docker compose
        run: |
          docker compose -f docker-compose.ci.yml up --abort-on-container-exit --exit-code-from web
      - name: Clean up
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: cd
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Install ansible
        run: pip install ansible
      - name: Run deploy
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem
          ansible-playbook -i "${{ secrets.ANSIBLE_HOSTS }}," -u ${{ secrets.SSH_USER }} --private-key key.pem ansible/deploy.yml --extra-vars "deploy_method=copy"
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_PROD }}
          SSL_ONLINE_FULLCHAIN: ${{ secrets.SSL_ONLINE_FULLCHAIN }}
          SSL_ONLINE_KEY: ${{ secrets.SSL_ONLINE_KEY }}
          SSL_RU_FULLCHAIN: ${{ secrets.SSL_RU_FULLCHAIN }}
          SSL_RU_KEY: ${{ secrets.SSL_RU_KEY }}