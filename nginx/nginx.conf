worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    client_max_body_size 25M;
    keepalive_timeout 65;

    server_tokens off;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    upstream django {
        server web:8000;
    }

    # assignia.online redirect to assignia.ru
    server {
        listen 80;
        server_name assignia.online;
        return 301 https://assignia.ru$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name assignia.online;

        ssl_certificate     /etc/nginx/certs/assignia.online.fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/assignia.online.key;
        ssl_trusted_certificate /etc/nginx/certs/assignia.online.fullchain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        return 301 https://assignia.ru$request_uri;
    }

    # www.assignia.online redirect to assignia.ru
    server {
        listen 80;
        server_name www.assignia.online;
        return 301 https://assignia.ru$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name www.assignia.online;

        ssl_certificate     /etc/nginx/certs/assignia.online.fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/assignia.online.key;
        ssl_trusted_certificate /etc/nginx/certs/assignia.online.fullchain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        return 301 https://assignia.ru$request_uri;
    }

    # Main domain assignia.ru
    server {
        listen 80;
        server_name assignia.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name www.assignia.ru;
        return 301 https://assignia.ru$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name assignia.ru;

        ssl_certificate     /etc/nginx/certs/assignia.ru.fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/assignia.ru.key;
        ssl_trusted_certificate /etc/nginx/certs/assignia.ru.fullchain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /app/media/;
        }

        location / {
            client_max_body_size 25M;
            proxy_pass http://django;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect off;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # www.assignia.ru redirect to assignia.ru
    server {
        listen 443 ssl http2;
        server_name www.assignia.ru;

        ssl_certificate     /etc/nginx/certs/assignia.ru.fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/assignia.ru.key;
        ssl_trusted_certificate /etc/nginx/certs/assignia.ru.fullchain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        return 301 https://assignia.ru$request_uri;
    }
}