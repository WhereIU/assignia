---
- name: Deploy Assignia
  hosts: assignia_server
  tasks:
    - name: Copy project files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: /opt/assignia/
        force: yes
      loop:
        - ../docker-compose.prod.yml
        - ../.env.prod
        - ../requirements.txt
        - ../app
        - ../nginx
        - ../docker

    - name: Start services
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.prod.yml up -d --build
        chdir: /opt/assignia