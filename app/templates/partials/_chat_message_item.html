<div class="p-3 rounded-3 mb-2 border-0 shadow-sm transition-all 
    {% if author == user %}bg-primary-subtle border-start border-primary border-3 ms-5{% else %}bg-light border-start border-secondary-subtle border-3 me-5{% endif %}">
    
    <div class="d-flex justify-content-between align-items-center mb-1">
        <strong class="small text-dark">
            <a href="{% url 'users:public_profile' username=author.username %}" class="text-decoration-none text-reset d-flex align-items-center gap-1">
                <i class="bi bi-person-sm"></i> {{ author.username }}
                {% if project_owner and author == project_owner %}
                    <span class="badge bg-dark-subtle text-dark fs-8 px-1.5 py-0.5">Разработчик</span>
                {% endif %}
            </a>
        </strong>
        <span class="text-muted" style="font-size: 0.75rem;">
            <i class="bi bi-clock"></i> {{ created_at|date:"d.m H:i" }}
        </span>
    </div>
    
    <p class="mb-0 text-dark small text-break" style="white-space: pre-line;">{{ text }}</p>
</div>

<style>
    .fs-8 { font-size: 0.7rem; }
</style>
