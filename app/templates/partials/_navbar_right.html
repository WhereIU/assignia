<div class="d-flex align-items-center gap-1 gap-sm-2">
    <div class="dropdown position-static position-sm-relative">
        <button class="btn btn-dark btn-sm p-2" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
            <i class="bi bi-search fs-6"></i>
        </button>
        <div class="dropdown-menu dropdown-menu-end p-3 custom-search-dropdown" style="width: 320px;">
            {% include 'partials/_search_bar.html' %}
        </div>
    </div>

    {% if user.is_authenticated %}
        <div>
            <a class="btn btn-dark btn-sm p-2" href="{% url 'projects:project_create' %}" title="Создать проект">
                <i class="bi bi-plus-circle fs-6"></i>
            </a>
        </div>
        
        <div>
            <a class="btn btn-dark btn-sm p-2 position-relative" href="{% url 'core:notifications' %}">
                <i class="bi bi-bell fs-6"></i>
                {% if unread_notifications_count %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem; padding: 0.25em 0.4em;">
                        {{ unread_notifications_count }}
                    </span>
                {% endif %}
            </a>
        </div>
        
        <div class="dropdown">
            <button class="btn btn-dark btn-sm dropdown-toggle d-flex align-items-center gap-1 p-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle fs-6"></i>
                <span class="d-none d-sm-inline-block text-truncate" style="max-width: 90px;">{{ user.username }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="{% url 'users:profile' %}">Настройки профиля</a></li>
                <li><a class="dropdown-item" href="{% url 'users:public_profile' username=user.username %}">Мой профиль</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-danger" 
                    href="#" 
                    hx-post="{% url 'users:logout' %}" 
                    hx-target="body" 
                    hx-push-url="true">
                    <i class="bi bi-box-arrow-right me-1"></i> Выйти
                    </a>
                </li>
            </ul>
        </div>
    {% else %}
        <a class="btn btn-sm btn-link text-light text-decoration-none px-2" href="{% url 'users:login' %}">Войти</a>
        <a class="btn btn-sm btn-outline-light px-2" href="{% url 'users:register' %}">Регистрация</a>
    {% endif %}
</div>
