<div class="card h-100">
    <div class="card-body">
        <h5 class="card-title">
            <a href="{% url 'projects:project_detail' username=project.owner.username slug=project.slug %}" class="text-decoration-none">
                {{ project.name }}
            </a>
        </h5>
        <p class="card-text">{{ project.description|truncatechars:100 }}</p>
        <div class="text-muted small">
            <a href="{% url 'users:public_profile' username=project.owner.username %}" class="text-decoration-none text-muted">
                <i class="bi bi-person me-1"></i>{{ project.owner.username }}
            </a>
        </div>
    </div>
</div>
