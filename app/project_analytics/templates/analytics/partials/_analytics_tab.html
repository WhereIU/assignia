<div class="analytics-tab-wrapper animate-fade-in">
    <div class="mb-4">
        <h3 class="fw-bold text-dark mb-1">Аналитика проекта</h3>
        <small class="text-muted">Интерактивные метрики</small>
    </div>

    <div class="row g-4">
        <div class="col-12 col-xl-6">
            <div id="analytics-card-1" 
                 hx-get="{% url 'project_analytics:analytics_widget' username=project.owner.username slug=project.slug %}?type=teams&block_id=1"
                 hx-trigger="load" 
                 hx-swap="outerHTML">
                 <div class="card shadow-sm border-0 p-5 text-center text-muted">
                     <div class="spinner-border spinner-border-sm text-secondary mb-2" role="status"></div>
                     <p class="mb-0 small">Загрузка аналитики команд...</p>
                 </div>
            </div>
        </div>

        <div class="col-12 col-xl-6">
            <div id="analytics-card-2" 
                 hx-get="{% url 'project_analytics:analytics_widget' username=project.owner.username slug=project.slug %}?type=participants&block_id=2"
                 hx-trigger="load" 
                 hx-swap="outerHTML">
                 <div class="card shadow-sm border-0 p-5 text-center text-muted">
                     <div class="spinner-border spinner-border-sm text-secondary mb-2" role="status"></div>
                     <p class="mb-0 small">Загрузка продуктивности участников...</p>
                 </div>
            </div>
        </div>
    </div>
</div>
