<h3>По участникам</h3>
<table class="table table-striped">
    <thead><tr>
        <th>Участник</th><th>Назначено задач</th><th>Выполнено</th><th>Оценка успеваемости</th>
    </tr></thead>
    <tbody>
    {% for p in participants %}
        <tr>
            <td><a href="{% url 'users:public_profile' username=p.username %}" class="text-decoration-none">{{ p.username }}</a></td>
            <td>{{ p.assigned_count }}</td>
            <td>{{ p.done_count }}</td>
            <td>{{ p.performance_score|floatformat:1|default:"—" }}</td>
        </tr>
    {% empty %}
        <tr><td colspan="4">Нет участников</td></tr>
    {% endfor %}
    </tbody>
</table>
