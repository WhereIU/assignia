<div class="card border-0 shadow-lg bg-body rounded-3 border-start border-success border-3 mb-3">
    <div class="card-body p-3">
        <form hx-post="{% url 'project_directions:direction_create' username=username slug=slug %}" 
              hx-target="#direction-form-container" 
              hx-swap="innerHTML">
            {% csrf_token %}
            
            <div class="mb-2">
                <label class="form-label small fw-semibold text-secondary mb-1">Название направления</label>
                <input type="text" name="name" class="form-control form-control-sm border-secondary-subtle" value="{{ name }}" placeholder="Именование направления" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary mb-1">Описание</label>
                <textarea name="description" class="form-control form-control-sm border-secondary-subtle" rows="2" placeholder="Кратко опишите направление">{{ description }}</textarea>
            </div>
            
            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-link btn-sm text-secondary link-underline-opacity-0 px-2" onclick="this.closest('#direction-form-container').innerHTML=''">Отмена</button>
                <button type="submit" class="btn btn-success btn-sm px-3">Создать направление</button>
            </div>
        </form>
    </div>
</div>
