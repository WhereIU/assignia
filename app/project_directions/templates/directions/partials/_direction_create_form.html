<div class="modal-dialog">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Добавление нового направления</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
        </div>
        <form hx-post="{% url 'project_directions:direction_create' username=username slug=slug %}" 
              hx-target="this"
              hx-swap="outerHTML"
              hx-on::after-request="if(event.detail.xhr.status === 200) { bootstrap.Modal.getInstance(document.getElementById('modal-container')).hide(); }">
            {% csrf_token %}
            
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-medium small">{{ form.name.label }}</label>
                    <input type="text" name="name" class="form-control {% if form.name.errors %}is-invalid{% endif %}" value="{{ form.name.value|default:'' }}" required>
                    {% if form.name.errors %}
                        <div class="invalid-feedback">{{ form.name.errors|join:", " }}</div>
                    {% endif %}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium small">{{ form.description.label }}</label>
                    <textarea name="description" class="form-control {% if form.description.errors %}is-invalid{% endif %}" rows="3">{{ form.description.value|default:'' }}</textarea>
                    {% if form.description.errors %}
                        <div class="invalid-feedback">{{ form.description.errors|join:", " }}</div>
                    {% endif %}
                </div>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-success btn-sm">Создать</button>
            </div>
        </form>
    </div>
</div>
