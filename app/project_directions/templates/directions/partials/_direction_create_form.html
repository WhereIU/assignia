<div class="modal-dialog">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Добавление нового направления</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
        </div>
        <form hx-post="{% url 'project_directions:direction_create' username=username slug=slug %}" 
            hx-swap="none"
            hx-on::after-request="if(event.detail.successful) { bootstrap.Modal.getInstance(document.getElementById('modal-container')).hide(); }">
            {% csrf_token %}
            
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Название направления</label>
                    <input type="text" name="name" class="form-control" value="{{ name|default:'' }}" autocomplete="off" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Описание</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Краткое описание задач направления">{{ description|default:'' }}</textarea>
                </div>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-success btn-sm">Создать</button>
            </div>
        </form>
    </div>
</div>
