<div class="modal-dialog">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Редактирование направления «{{ direction.name }}»</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
        </div>
        
        <form hx-post="{% url 'project_directions:direction_update' direction_pk=direction.pk %}" 
              hx-target="this"
              hx-swap="outerHTML"
              hx-on::before-request="
                const modalEl = document.getElementById('modal-container');
                const modal = bootstrap.Modal.getInstance(modalEl);
                if (modal) { modal.hide(); }
              ">
            {% csrf_token %}
            
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">{{ form.name.label }}</label>
                    {{ form.name }}
                    {% if form.name.errors %}
                        <script>document.getElementsByName('name')[0].classList.add('is-invalid');</script>
                        <div class="invalid-feedback d-block">{{ form.name.errors|join:", " }}</div>
                    {% endif %}
                </div>
                <div class="mb-3">
                    <label class="form-label">{{ form.description.label }}</label>
                    {{ form.description }}
                    {% if form.description.errors %}
                        <script>document.getElementsByName('description')[0].classList.add('is-invalid');</script>
                        <div class="invalid-feedback d-block">{{ form.description.errors|join:", " }}</div>
                    {% endif %}
                </div>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-primary btn-sm">Сохранить изменения</button>
            </div>
        </form>
    </div>
</div>
