<div class="modal-dialog">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Редактирование направления «{{ direction.name }}»</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
        </div>
        
        <form hx-post="{% url 'project_directions:direction_update' direction_pk=direction.pk %}" 
              hx-swap="none"
              hx-on::after-request="if(event.detail.successful) { bootstrap.Modal.getInstance(document.getElementById('modal-container')).hide(); }">
            {% csrf_token %}
            
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Название направления</label>
                    <input type="text" name="name" class="form-control" value="{{ name|default:direction.name }}" autocomplete="off" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Описание</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Кратко опишите направление">{{ description|default:direction.description|default:'' }}</textarea>
                </div>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-primary btn-sm">Сохранить изменения</button>
            </div>
        </form>
    </div>
</div>
