<div class="card border-0 shadow-lg bg-body rounded-3 border-start border-primary border-3 position-absolute top-0 start-0 w-100" style="z-index: 1060;">
    <div class="card-body p-3">
        <form hx-post="{% url 'project_directions:direction_update' direction_pk=direction.pk %}" 
              hx-target="closest .card" 
              hx-swap="outerHTML">
            {% csrf_token %}
            
            <div class="mb-2">
                <label class="form-label small fw-semibold text-secondary mb-1">Название направления</label>
                <input type="text" name="name" class="form-control form-control-sm border-primary-subtle" value="{% if name is not None %}{{ name }}{% else %}{{ direction.name }}{% endif %}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary mb-1">Описание</label>
                <textarea name="description" class="form-control form-control-sm border-secondary-subtle" rows="2" placeholder="Описание отсутствует">{% if description is not None %}{{ description }}{% else %}{{ direction.description|default:'' }}{% endif %}</textarea>
            </div>
            
            <div class="d-flex justify-content-end gap-2">
                <button type="button" 
                        class="btn btn-link btn-sm text-secondary link-underline-opacity-0 px-2" 
                        onclick="document.getElementById('direction-edit-container-{{ direction.pk }}').innerHTML=''">
                    Отмена
                </button>
                <button type="submit" class="btn btn-success btn-sm px-3">Сохранить</button>
            </div>
        </form>
    </div>
</div>
