<div class="d-flex flex-wrap gap-2 align-items-center">
    {% for direction in task.directions.all %}
        <span class="badge bg-light text-primary border border-primary-subtle d-flex align-items-center gap-1 py-1 px-2 rounded-pill shadow-sm">
            <span>{{ direction.name }}</span>
            <span role="button"
                  tabindex="0"
                  class="text-danger ms-1 small-icon"
                  hx-post="{% url 'project_tasks:direction_remove_from_task' task.pk %}"
                  hx-vals='{"direction_id": "{{ direction.id }}"}'
                  hx-target="#selected-directions"
                  hx-swap="innerHTML"
                  style="font-size: 0.85rem; line-height: 1; cursor: pointer;"
                  title="Удалить">&times;</span>
        </span>
    {% empty %}
        <span class="text-muted small fst-italic">Направления не выбраны</span>
    {% endfor %}
</div>
