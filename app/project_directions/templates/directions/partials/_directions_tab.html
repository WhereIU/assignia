<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Направления</h5>
    <div>
        {% if not show_deleted %}
            <button class="btn btn-outline-secondary btn-sm"
                    hx-get="{% url 'project_directions:directions_tab' username=project.owner.username slug=project.slug %}?show_deleted=1"
                    hx-target="#tab-content" hx-swap="innerHTML">
                Показать удалённые
            </button>
        {% else %}
            <button class="btn btn-outline-secondary btn-sm"
                    hx-get="{% url 'project_directions:directions_tab' username=project.owner.username slug=project.slug %}"
                    hx-target="#tab-content" hx-swap="innerHTML">
                Скрыть удалённые
            </button>
        {% endif %}
        <button class="btn btn-success btn-sm ms-2"
                hx-get="{% url 'project_directions:direction_create_form' username=project.owner.username slug=project.slug %}"
                hx-target="#direction-form-container" hx-swap="innerHTML">
            <i class="bi bi-plus-lg"></i> Добавить направление
        </button>
    </div>
</div>

<div id="direction-form-container"></div>

{% include 'directions/partials/_directions_list.html' with directions=directions show_deleted=show_deleted can_manage=can_manage %}
