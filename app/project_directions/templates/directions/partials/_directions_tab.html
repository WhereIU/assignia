<div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center border-bottom pb-3 mb-4 gap-3">
    <div>
        <h5 class="mb-1 fw-bold text-dark">Направления проекта</h5>
        <p class="text-muted small mb-0">Управление направлениями проектов</p>
    </div>
    <div class="d-flex align-items-center gap-2">
        {% if not show_deleted %}
            <button class="btn btn-sm btn-light border-secondary-subtle text-secondary px-3"
                    hx-get="{% url 'project_directions:directions_tab' username=username slug=slug %}?show_deleted=1"
                    hx-target="#tab-content" 
                    hx-swap="innerHTML">
                <i class="bi bi-eye-slash me-1"></i> Показать удалённые
            </button>
        {% else %}
            <button class="btn btn-sm btn-dark px-3"
                    hx-get="{% url 'project_directions:directions_tab' username=username slug=slug %}"
                    hx-target="#tab-content" 
                    hx-swap="innerHTML">
                <i class="bi bi-eye me-1"></i> Скрыть удалённые
            </button>
        {% endif %}
        
        <button class="btn btn-sm btn-primary px-3"
                hx-get="{% url 'project_directions:direction_create_form' username=username slug=slug %}"
                hx-target="#direction-form-container" 
                hx-swap="innerHTML">
            <i class="bi bi-plus-lg me-1"></i> Добавить направление
        </button>
    </div>
</div>

<div class="position-relative w-100">
    <div id="direction-form-container" class="position-absolute start-0 top-0 w-100" style="z-index: 1050;"></div>
    
    <div id="directions-list-wrapper"
         hx-get="{% url 'project_directions:directions_tab' username=username slug=slug %}?show_deleted={{ show_deleted|yesno:'1,0' }}"
         hx-trigger="directionsChanged from:body"
         hx-swap="innerHTML">
        {% include 'directions/partials/_directions_list.html' %}
    </div>
</div>
