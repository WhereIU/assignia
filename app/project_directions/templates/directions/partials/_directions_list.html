            <div class="text-muted mb-2">
                <i class="bi bi-folder2-open display-6 opacity-50"></i>
            </div>
            <span class="text-secondary fw-medium">Направления пока не созданы</span>

{% include "partials/_paginator.html" with hx_target="#directions-list-wrapper" %}
