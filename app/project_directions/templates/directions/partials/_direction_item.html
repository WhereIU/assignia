<div class="card border-0 shadow-sm rounded-3 position-relative">
    <div class="card-body d-flex align-items-start justify-content-between p-3">
        
        <div class="me-2 text-truncate">
            <h6 class="mb-1 fw-bold text-dark text-truncate">{{ direction.name }}</h6>
            {% if direction.description %}
                <p class="text-muted small mb-0 text-wrap" title="{{ direction.description }}">
                    {{ direction.description }}
                </p>
            {% else %}
                <p class="text-muted small mb-0 text-secondary opacity-50 fst-italic">Без описания</p>
            {% endif %}
        </div>

        {% if can_manage %}
        <div class="dropdown flex-shrink-0">
            <button class="btn btn-link text-secondary p-0 rounded-circle border-0 d-flex align-items-center justify-content-center" 
                    type="button" 
                    data-bs-toggle="dropdown" 
                    style="width: 32px; height: 32px;">
                <i class="bi bi-three-dots-vertical fs-5"></i>
            </button>
            
            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 border-light-subtle">
                {% if not show_deleted %}
                    <li>
                        <button class="dropdown-item d-flex align-items-center gap-2 py-2 text-secondary"
                                hx-get="{% url 'project_directions:direction_edit_form' direction_pk=direction.pk %}"
                                hx-target="#direction-edit-container-{{ direction.pk }}" 
                                hx-swap="innerHTML"
                                onclick="document.querySelectorAll('.direction-edit-container').forEach(el => el.innerHTML = '');">
                            <i class="bi bi-pencil small"></i> Редактировать
                        </button>
                    </li>
                    <li>
                        <button class="dropdown-item d-flex align-items-center gap-2 py-2 text-secondary"
                                hx-get="{% url 'project_teams:teams_tab' direction_pk=direction.pk %}"
                                hx-target="#tab-content" 
                                hx-swap="innerHTML">
                            <i class="bi bi-people small"></i> Команды
                        </button>
                    </li>
                    <li><hr class="dropdown-divider opacity-50"></li>
                    <li>
                        <button class="dropdown-item d-flex align-items-center gap-2 py-2 text-danger"
                                hx-post="{% url 'project_directions:direction_delete' direction_pk=direction.pk %}"
                                hx-swap="none">
                            <i class="bi bi-trash small"></i> Удалить
                        </button>
                    </li>
                {% else %}
                    <li>
                        <button class="dropdown-item d-flex align-items-center gap-2 py-2 text-success"
                                hx-post="{% url 'project_directions:direction_restore' direction_pk=direction.pk %}"
                                hx-swap="none">
                            <i class="bi bi-arrow-counterclockwise small"></i> Восстановить
                        </button>
                    </li>
                    <li>
                        <button class="dropdown-item d-flex align-items-center gap-2 py-2 text-danger"
                                hx-post="{% url 'project_directions:direction_hard_delete' direction_pk=direction.pk %}"
                                hx-swap="none">
                            <i class="bi bi-x-octagon small"></i> Удалить навсегда
                        </button>
                    </li>
                {% endif %}
            </ul>
        </div>
        {% endif %}

    </div>

    <div id="direction-edit-container-{{ direction.pk }}" class="direction-edit-container"></div>
</div>
