<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Команды направления «{{ direction.name }}»</h5>
    <div>
        {% if not show_deleted %}
            <button class="btn btn-outline-secondary btn-sm"
                    hx-get="{% url 'project_teams:teams_tab' direction_pk=direction.pk %}?show_deleted=1"
                    hx-target="#tab-content" hx-swap="innerHTML">
                Показать удалённые
            </button>
        {% else %}
            <button class="btn btn-outline-secondary btn-sm"
                    hx-get="{% url 'project_teams:teams_tab' direction_pk=direction.pk %}"
                    hx-target="#tab-content" hx-swap="innerHTML">
                Скрыть удалённые
            </button>
        {% endif %}
        <button class="btn btn-primary btn-sm ms-2"
                hx-get="{% url 'project_teams:team_create_form' direction_pk=direction.pk %}"
                hx-target="#modal-container" hx-swap="innerHTML">
            <i class="bi bi-plus-lg"></i> Добавить команду
        </button>
    </div>
</div>
<div class="position-relative w-100">
    <div id="team-form-container" class="position-absolute start-0 top-0 w-100" style="z-index: 1050;"></div>
    
    <div id="teams-list-wrapper"
         hx-get="{% url 'project_teams:teams_tab' direction_pk=direction.pk %}?show_deleted={{ show_deleted|yesno:'1,0' }}"
         hx-trigger="teamsChanged from:body"
         hx-swap="innerHTML">
        {% include 'teams/partials/_teams_list.html' %}
    </div>
</div>
