{% for team in teams %}
    <button type="button" class="list-group-item list-group-item-action py-1"
            hx-post="{% url 'tasks:team_add_to_task' task.pk %}"
            hx-vals='{"team_id": "{{ team.id }}"}'
            hx-target="#selected-teams"
            hx-swap="innerHTML">
        {{ team.name }}
    </button>
{% empty %}
    <div class="text-muted small px-2 py-1">Ничего не найдено</div>
{% endfor %}
