<div class="col">
    <div class="card h-100 shadow-sm border-{% if show_deleted %}danger{% else %}light{% endif %} position-relative">
        <div class="card-body d-flex flex-column justify-content-between">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="card-title mb-1 text-dark fw-bold pe-4">{{ team.name }}</h6>
                    <small class="text-muted">
                        <i class="bi bi-people-fill me-1"></i>
                        Участников: <span class="badge bg-light text-dark border">{{ team.members.count }}</span>
                    </small>
                </div>
                <div class="dropdown">
                    <button class="btn btn-link text-muted p-0 lh-1" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-three-dots-vertical fs-5"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                        {% if not show_deleted %}
                            <li>
                                <a class="dropdown-menu-item dropdown-item small d-flex align-items-center" 
                                   hx-get="{% url 'project_teams:team_members' team_pk=team.pk %}"
                                   hx-target="#tab-content" hx-swap="innerHTML" style="cursor: pointer;">
                                    <i class="bi bi-people me-2 text-secondary"></i> Участники команды
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-menu-item dropdown-item small d-flex align-items-center" 
                                   hx-get="{% url 'project_teams:team_edit_form' direction_pk=direction.pk team_pk=team.pk %}"
                                   hx-target="#modal-container" hx-swap="innerHTML" style="cursor: pointer;">
                                    <i class="bi bi-pencil me-2 text-secondary"></i> Редактировать
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-menu-item dropdown-item small text-danger d-flex align-items-center" 
                                   hx-get="{% url 'project_teams:team_delete_confirm_form' team_pk=team.pk %}"
                                   hx-target="#modal-container" hx-swap="innerHTML" style="cursor: pointer;">
                                    <i class="bi bi-trash me-2"></i> Удалить временно
                                </a>
                            </li>
                        {% else %}
                            <li>
                                <a class="dropdown-menu-item dropdown-item small text-success d-flex align-items-center" 
                                   hx-post="{% url 'project_teams:team_restore' team_pk=team.pk %}"
                                   hx-swap="none" 
                                   style="cursor: pointer;">
                                    <i class="bi bi-arrow-counterclockwise me-2"></i> Восстановить
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-menu-item dropdown-item small text-danger fw-bold d-flex align-items-center" 
                                   hx-post="{% url 'project_teams:team_hard_delete' team_pk=team.pk %}"
                                   hx-swap="none"
                                   style="cursor: pointer;">
                                    <i class="bi bi-exclamation-octagon me-2"></i> Удалить полностью
                                </a>
                            </li>
                        {% endif %}
                    </ul>
                </div>
            </div>

            {% if show_deleted %}
                <div class="mt-3 pt-2 border-top text-center">
                    <span class="badge bg-danger-subtle text-danger px-2 py-1 small">Временно удаленная</span>
                </div>
            {% endif %}

        </div>
    </div>
</div>
