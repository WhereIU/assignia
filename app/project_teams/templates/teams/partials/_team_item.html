<tr>
    <td>{{ team.name }}</td>
    <td>
        <div class="d-flex gap-1">
            {% if not show_deleted %}
                <button class="btn btn-outline-secondary btn-sm"
                        hx-get="{% url 'project_teams:team_edit_form' direction_pk=direction.pk team_pk=team.pk %}"
                        hx-target="#team-form-container" hx-swap="innerHTML">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm"
                        hx-post="{% url 'project_teams:team_delete' team_pk=team.pk %}"
                        hx-target="#tab-content" hx-swap="innerHTML">
                    <i class="bi bi-trash"></i>
                </button>
                <button class="btn btn-outline-primary btn-sm"
                        hx-get="{% url 'project_teams:team_members' team_pk=team.pk %}"
                        hx-target="#tab-content" hx-swap="innerHTML">
                    <i class="bi bi-people"></i> Участники
                </button>
            {% else %}
                <button class="btn btn-outline-success btn-sm"
                        hx-post="{% url 'project_teams:team_restore' team_pk=team.pk %}"
                        hx-target="#tab-content" hx-swap="innerHTML">
                    <i class="bi bi-arrow-counterclockwise"></i> Восстановить
                </button>
            {% endif %}
        </div>
    </td>
</tr>
