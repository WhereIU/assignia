{% for member in members %}
    <button type="button" class="list-group-item list-group-item-action py-1"
            hx-post="{% url 'project_teams:team_member_add' team_pk=team.pk %}"
            hx-vals='{"user_id": "{{ member.user.pk }}"}'
            hx-target="#team-members-container"
            hx-swap="outerHTML">
        {{ member.user.username }}
    </button>
{% empty %}
    <div class="text-muted small px-2 py-1">Ничего не найдено</div>
{% endfor %}
