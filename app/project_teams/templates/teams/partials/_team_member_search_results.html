<div class="list-group list-group-flush rounded border small mt-2">
    {% for membership in members %}
        {% if team not in membership.user.teams.all %}
            <div class="list-group-item d-flex justify-content-between align-items-center py-2 px-3">
                <div class="text-truncate pe-2">
                    <i class="bi bi-person me-1 text-muted"></i>
                    <strong class="text-dark">{{ membership.user.username }}</strong>
                    <br>
                    <small class="text-muted fs-7">{{ membership.get_role_display }}</small>
                </div>
                <button class="btn btn-xs btn-success py-1 px-2 fs-7 flex-shrink-0"
                        hx-post="{% url 'project_teams:team_member_add' team_pk=team.pk user_pk=membership.user.pk %}"
                        hx-target="#team-members-list-wrapper"
                        hx-swap="innerHTML"
                        hx-vals='{"csrfmiddlewaretoken": "{{ csrf_token }}"}'
                        hx-on::after-request="document.getElementById('add-member-drop-container').style.display='none'; document.getElementById('project-member-search-input').value=''; document.getElementById('search-project-results').innerHTML='';">
                    <i class="bi bi-plus"></i>
                </button>
            </div>
        {% endif %}
    {% empty %}
        <div class="text-center text-muted py-3">Никого не найдено в проекте</div>
    {% endfor %}
</div>
