{% extends 'users/settings_base.html' %}
{% block title %}Смена пароля{% endblock %}

{% block settings_content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="card-title mb-3">Смена пароля</h5>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-warning">Сменить пароль</button>
        </form>
    </div>
</div>
{% endblock %}
