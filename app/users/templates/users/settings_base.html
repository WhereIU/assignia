{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body p-2">
                <ul class="nav flex-column">
                  <li class="nav-item">
                      <a class="nav-link {% if request.resolver_match.url_name == 'profile' %}active{% endif %}"
                        href="{% url 'users:profile' %}">
                          <i class="bi bi-person me-2"></i> Профиль
                      </a>
                  </li>
                  <li class="nav-item">
                      <a class="nav-link {% if request.resolver_match.url_name == 'account' %}active{% endif %}"
                        href="{% url 'users:account' %}">
                          <i class="bi bi-gear me-2"></i> Аккаунт
                      </a>
                  </li>
                  <li class="nav-item">
                      <a class="nav-link disabled" href="#">
                          <i class="bi bi-bell me-2"></i> Уведомления
                      </a>
                  </li>
              </ul>
            </div>
        </div>
    </div>
    <div class="col-md-9">
        {% block settings_content %}{% endblock %}
    </div>
</div>
{% endblock %}
