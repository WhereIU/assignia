<div class="card shadow-sm mb-3">
    <div class="card-body">
        <h5 class="mb-2">Сменить пароль</h5>
        <form hx-post="{% url 'users:account' %}" hx-target="#password-container" hx-swap="innerHTML">
            {% csrf_token %}
            {% for field in password_form %}
                <div class="mb-2">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="invalid-feedback d-block">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" name="change_password" class="btn btn-primary btn-sm">Сохранить пароль</button>
            <button type="button" class="btn btn-outline-secondary btn-sm"
                    hx-get="{% url 'users:account_password_display' %}" hx-target="#password-container" hx-swap="innerHTML">
                Отмена
            </button>
        </form>
    </div>
</div>
