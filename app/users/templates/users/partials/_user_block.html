<div id="avatar-management-block" class="d-flex align-items-center mb-4 gap-3 flex-wrap">
    <div class="flex-shrink-0">
        {% if user.avatar %}
            <img src="{{ user.avatar.url }}" alt="Аватар" class="rounded-circle object-fit-cover border shadow-sm" width="72" height="72">
        {% else %}
            <i class="bi bi-person-circle text-secondary" style="font-size: 72px; line-height: 1;"></i>
        {% endif %}
    </div>
    
    <div class="flex-grow-1">
        <h4 class="card-title mb-0 fw-bold text-dark">{{ user.username }}</h4>
        <div class="d-flex align-items-center gap-2 flex-wrap mt-1">
            <small class="text-muted">Редактирование профиля</small>
            
            {% if user.avatar %}
                <span class="text-muted opacity-50">|</span>
                <button type="button" 
                        hx-get="{% url 'users:delete_avatar' %}"
                        hx-target="#modal-container"
                        class="btn p-0 text-danger btn-link btn-sm text-decoration-none bg-transparent border-0 small">
                    <i class="bi bi-trash3 me-1"></i>Удалить аватар
                </button>
            {% endif %}
        </div>
    </div>
</div>
