{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="mb-4 text-center">
                    Регистрация
                </h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label
                                for="{{ field.id_for_label }}"
                                class="form-label">
                                {{ field.label }}
                            </label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="invalid-feedback d-block">
                                    {{ field.errors|striptags }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button
                        type="submit"
                        class="btn btn-primary w-100">
                        Зарегестрироваться
                    </button>
                </form>
                <p class="mt-3 text-center">Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
