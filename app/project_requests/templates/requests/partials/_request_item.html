{% load request_ui %}
<a href="{% url 'project_requests:request_detail' request_pk=req.pk %}"
   class="card text-decoration-none border shadow-sm-hover mb-2 transition-all text-reset">
    <div class="card-body p-3">
        <div class="d-flex flex-column flex-md-row justify-content-between gap-2 gap-md-3">
            
            <div class="flex-grow-1 order-2 order-md-1 min-w-0">
                <div class="mb-1 text-dark fw-medium text-break">
                    {{ req.description|truncatechars:100 }}
                </div>
                <div class="text-muted small d-flex flex-wrap align-items-center gap-2">
                    <span class="d-inline-flex align-items-center gap-1 text-nowrap">
                        <i class="bi bi-person-circle"></i>
                        {% if req.author %}{{ req.author.username }}{% else %}неизвестный{% endif %}
                    </span>
                    <span class="d-none d-sm-inline">·</span>
                    <span class="text-nowrap"><i class="bi bi-clock"></i> {{ req.created_at|date:"d.m.Y H:i" }}</span>
                </div>
            </div>
            
            <div class="order-1 order-md-2 align-self-start ms-md-auto">
                <span class="badge rounded-all border px-2 py-1.5 fs-7 d-inline-flex align-items-center gap-1 text-nowrap {{ req.status|status_css }}">
                    <i class="bi {{ req.status|status_icon }}"></i>
                    {{ req.get_status_display }}
                </span>
            </div>
        </div>
    </div>
</a>
