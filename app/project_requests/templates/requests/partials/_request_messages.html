{% load static %}
<div class="card shadow-sm border-0 rounded-4">
    <div class="card-header bg-white border-0 pt-4 px-4 pb-0">
        <h5 class="fw-bold text-dark d-flex align-items-center gap-2 mb-0">
            <i class="bi bi-chat-square-text text-primary"></i> Обсуждение запроса
        </h5>
    </div>

    <div class="card-body p-4">
        <div id="messages-list-wrapper" class="mb-4">
            {% include 'requests/partials/_request_messages_list.html' with messages_list=messages_list page_obj=page_obj %}
        </div>

        <form hx-post="{% url 'project_requests:request_message_add' request_pk=req.pk %}"
            hx-target="#messages-list-wrapper" 
            hx-swap="innerHTML" hx-on::after-request="this.reset()"
            class="position-relative border rounded-3 p-2 bg-light-subtle">
            {% csrf_token %}
            
            <textarea class="form-control border-0 bg-transparent ps-2 shadow-none" 
                      name="text" 
                      rows="3" 
                      maxlength="1000"
                      placeholder="Напишите ответ или уточнение..."
                      style="resize: none;"></textarea>
            
            <div class="d-flex justify-content-between align-items-center pt-2 px-2 border-top bg-white rounded-bottom-3">
                <span class="text-muted small"><i class="bi bi-info-circle"></i> Ctrl + Enter для отправки</span>
                
                <button type="submit" class="btn btn-primary btn-sm px-3 d-inline-flex align-items-center gap-1 fw-medium shadow-sm">
                    <span>Отправить</span>
                    <span class="htmx-indicator spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                </button>
            </div>
        </form>
    </div>
</div>

{% block extra_js %}
    <script src="{% static 'js/comment-shortcut.js' %}"></script>
{% endblock %}
