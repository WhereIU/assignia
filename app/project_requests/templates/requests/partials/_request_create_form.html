<div class="request-form-overlay">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Новый запрос</h5>
        <button type="button" class="btn-close" aria-label="Закрыть"
                onclick="this.closest('#request-form-container').innerHTML = ''"></button>
    </div>
    <form hx-post="{% url 'requests:request_create_submit' username=project.owner.username slug=project.slug %}"
          hx-target="#tab-content"
          hx-swap="innerHTML">
        {% csrf_token %}
        <div class="mb-3">
            <textarea class="form-control" name="description" rows="4" placeholder="Опишите проблему или задачу..."></textarea>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm"
                    onclick="this.closest('#request-form-container').innerHTML = ''">
                Отмена
            </button>
            <button type="submit" class="btn btn-success btn-sm">Отправить</button>
        </div>
    </form>
</div>
