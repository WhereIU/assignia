<div class="card shadow-sm border-0 mb-4">
    <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div class="d-flex align-items-center gap-2">
                <div class="p-2 bg-primary-subtle text-primary rounded border border-primary-subtle">
                    <i class="bi bi-headset fs-5"></i>
                </div>
                <h3 class="h4 mb-0 fw-bold text-dark">
                    {% if is_tech_support %}Все запросы техподдержки{% else %}Мои запросы{% endif %}
                </h3>
            </div>
            
            <button class="btn btn-primary d-inline-flex align-items-center gap-2 px-3 shadow-sm fw-medium"
                    hx-get="{% url 'project_requests:request_create' username=project.owner.username slug=project.slug %}"
                    hx-target="#modal-container" 
                    hx-swap="innerHTML"
                    data-bs-toggle="modal" 
                    data-bs-target="#universalModal">
                <i class="bi bi-plus-lg"></i> Создать запрос
            </button>
        </div>

        <div id="requests-list-wrapper" 
             hx-get="{% url 'project_requests:requests_tab' username=project.owner.username slug=project.slug %}" 
             hx-trigger="requestsChanged from:body" 
             hx-target="this" 
             hx-swap="innerHTML">
            {% include 'requests/partials/_requests_list.html' with requests=requests project=project %}
        </div>
    </div>
</div>
