<div class="position-relative">
    {% if requests %}
        <div class="d-flex flex-column gap-2">
            {% for req in requests %}
                {% include 'requests/partials/_request_item.html' with req=req project=project %}
            {% endfor %}
        </div>
    {% else %}
        <div class="text-center py-5 border rounded bg-light-subtle">
            <i class="bi bi-chat-left-dots text-muted fs-2 mb-2 d-block"></i>
            <p class="text-muted mb-0">Запросов пока нет.</p>
        </div>
    {% endif %}
</div>
