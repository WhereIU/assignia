{% if can_manage %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Направления</h5>
    <button class="btn btn-success btn-sm" hx-get="{% url 'projects:create_direction_form' username=project.owner.username slug=project.slug %}"
            hx-target="#direction-form-container" hx-swap="innerHTML">
        <i class="bi bi-plus-lg"></i> Добавить направление
    </button>
</div>

<div id="direction-form-container"></div>
{% endif %}

<div class="table-responsive">
    <table class="table table-striped">
        <thead><tr>
            <th>Название</th><th>Описание</th><th>Задач</th>
            {% if can_manage %}<th>Действия</th>{% endif %}
        </tr></thead>
        <tbody>
        {% for d in directions %}
            <tr>
                <td>{{ d.name }}</td>
                <td class="text-muted small">{{ d.description|default:"—" }}</td>
                <td>{{ d.task_count }}</td>
                {% if can_manage %}
                <td>
                    <button class="btn btn-outline-secondary btn-sm" hx-get="{% url 'projects:edit_direction_form' username=project.owner.username slug=project.slug direction_pk=d.pk %}"
                            hx-target="#direction-form-container" hx-swap="innerHTML">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-outline-danger btn-sm" 
                            hx-post="{% url 'projects:delete_direction' username=project.owner.username slug=project.slug direction_pk=d.pk %}"
                            hx-target="#tab-content" hx-swap="innerHTML">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
                {% endif %}
            </tr>
        {% empty %}
            <tr><td colspan="4">Нет направлений</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
