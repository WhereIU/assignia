<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Настройки проекта</h5>
    <button class="btn btn-outline-secondary btn-sm"
            hx-get="{% url 'projects:project_settings_form' username=project.owner.username slug=project.slug %}"
            hx-target="#settings-form-container"
            hx-swap="innerHTML">
        <i class="bi bi-pencil"></i> Редактировать
    </button>
</div>

<div id="settings-form-container"></div>

<div class="card">
    <div class="card-body">
        <dl class="row mb-0">
            <dt class="col-sm-3">Название</dt>
            <dd class="col-sm-9">{{ project.name }}</dd>
            <dt class="col-sm-3">Описание</dt>
            <dd class="col-sm-9">{{ project.description|default:"—" }}</dd>
            <dt class="col-sm-3">Публичность</dt>
            <dd class="col-sm-9">
                {% if project.is_public %}
                    <span class="badge bg-success">Публичный</span>
                {% else %}
                    <span class="badge bg-warning text-dark">Приватный</span>
                {% endif %}
            </dd>
        </dl>
    </div>
</div>
