<li class="list-group-item d-flex justify-content-between align-items-center px-0 py-2.5 text-muted bg-light-subtle">
    <div>
        <span class="small text-secondary">Проект «<strong>{{ invitation.project.name }}</strong>»</span>
        <div class="mt-1">
            {% if status == "accepted" %}
                <span class="badge bg-success bg-opacity-10 text-success border border-success-subtle">Принято</span>
            {% else %}
                <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary-subtle">Отклонено</span>
            {% endif %}
        </div>
    </div>
</li>
