<form id="projects-search-form" 
      hx-get="{% url search_url %}" 
      hx-target="{{ target_container|default:'#projects-container' }}" 
      hx-swap="innerHTML"
      hx-trigger="keyup changed delay:400ms from:input[type=search], search, submit"
      class="position-relative style-search-form" style="max-width: 450px; width: 100%;">
    
    {% include 'partials/_search_input.html' with placeholder='Поиск проектов...' %}
</form>
