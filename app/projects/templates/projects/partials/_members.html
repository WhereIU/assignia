{% include 'partials/_messages.html' %}

<div class="card">
    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Участники</h5>

            {% if actor_role == 'owner' or actor_role == 'admin' %}
                <button
                    class="btn btn-success btn-sm"
                    hx-get="{% url 'projects:invitation_form' username=project.owner.username slug=project.slug %}"
                    hx-target="#invite-form-container"
                    hx-swap="innerHTML">
                    Пригласить
                </button>
            {% endif %}
        </div>

        <div id="invite-form-container"></div>

        <form
            class="mb-3"
            hx-get="{% url 'projects:members_tab' username=project.owner.username slug=project.slug %}"
            hx-target="#members-list-wrapper"
            hx-swap="innerHTML">

            <div class="input-group">
                <input
                    type="text"
                    name="search"
                    class="form-control"
                    value="{{ search_query }}"
                    placeholder="Поиск участников">

                <button class="btn btn-outline-secondary">
                    Найти
                </button>
            </div>
        </form>

        <div id="pending-invitations-wrapper">
            {% include 'projects/partials/_pending_invitations.html' %}
        </div>

        <div id="members-list-wrapper">
            {% include 'projects/partials/_members_list.html' %}
        </div>

    </div>
</div>
