<div style="position: absolute; top: 0; left: 0; right: 0; z-index: 1000; background: #fff; border: 2px solid #198754; border-radius: 0.5rem; padding: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.15);">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Новый запрос</h5>
        <button type="button" class="btn-close" aria-label="Закрыть"
                onclick="this.closest('#request-form-container').innerHTML = ''"></button>
    </div>
    <form hx-post="{% url 'projects:request_create_submit' username=project.owner.username slug=project.slug %}"
          hx-target="#request-form-container" hx-swap="outerHTML">
        {% csrf_token %}
        <div class="mb-3">
            <textarea class="form-control" name="description" rows="4" placeholder="Опишите проблему или задачу..."></textarea>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm"
                    onclick="this.closest('#request-form-container').innerHTML = ''">
                Отмена
            </button>
            <button type="submit" class="btn btn-success btn-sm">Отправить</button>
        </div>
    </form>
</div>
