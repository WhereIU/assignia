<div id="invite-form-container">
    <form hx-post="{{ submit_url }}" hx-target="#invite-form-container" hx-swap="outerHTML">
        {% csrf_token %}
        <div class="input-group">
            <input type="text" name="username" class="form-control form-control-sm" placeholder="Имя пользователя" required>
            <button type="submit" class="btn btn-success btn-sm px-3">Пригласить</button>
            <button type="button" class="btn btn-outline-secondary btn-sm"
                    onclick="this.closest('#invite-form-container').innerHTML = ''">
                Отмена
            </button>
        </div>
        {% if error_message %}
            <div class="text-danger small mt-1"><i class="bi bi-exclamation-circle me-1"></i>{{ error_message }}</div>
        {% endif %}
    </form>
</div>
