<form hx-post="{{ submit_url }}" hx-target="#invite-form-container" hx-swap="innerHTML">
    {% csrf_token %}
    <div class="input-group">
        <input type="text" name="username" class="form-control" placeholder="Имя пользователя">
        <button type="submit" class="btn btn-success btn-sm">Пригласить</button>
        <button type="button" class="btn btn-outline-secondary btn-sm"
                onclick="this.closest('#invite-form-container').innerHTML = ''">
            Отмена
        </button>
    </div>
</form>
