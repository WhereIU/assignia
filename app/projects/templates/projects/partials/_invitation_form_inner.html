<div class="modal-header border-bottom-0 pb-0">
    <h5 class="modal-title fw-bold">Пригласить в проект</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form hx-post="{{ submit_url }}"
      hx-target="#modal-content"
      hx-swap="innerHTML"
      novalidate>
    {% csrf_token %}
    
    <div class="modal-body py-3">
        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Имя пользователя</label>
            <div class="input-group shadow-sm-inside">
                <span class="input-group-text bg-light text-secondary"><i class="bi bi-person"></i></span>
                <input type="text" 
                       name="username" 
                       class="form-control" 
                       placeholder="Введите точный логин пользователя..."
                       value="{{ typed_username|default:'' }}"
                       required>
            </div>
        </div>

        <div class="mb-2">
            <label class="form-label small fw-semibold text-secondary">Роль в проекте</label>
            <select name="role" class="form-select shadow-sm-inside">
                {% for key, value in membership_roles %}
                    {% if key != 'owner' %}
                        <option value="{{ key }}" {% if selected_role == key %}selected{% endif %}>
                            {{ value }}
                        </option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="modal-footer border-top-0 pt-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Готово</button>
        <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-send me-1"></i> Отправить приглашение
        </button>
    </div>
</form>
