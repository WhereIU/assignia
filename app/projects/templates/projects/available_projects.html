{% extends 'base.html' %}
{% block title %}Доступные проекты{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <h1 class="mb-0">Доступные проекты</h1>
    
    <form id="projects-search-form" 
        hx-get="{% url 'projects:available_projects' %}" 
        hx-target="#projects-container" 
        hx-swap="innerHTML"
        hx-trigger="keyup changed delay:400ms from:input[type=search], search, submit"
        hx-on::after-request="this.querySelector('input[type=search]').focus()"
        class="position-relative style-search-form" style="max-width: 450px; width: 100%;">
        
        {% include 'partials/_search_input.html' with placeholder='Поиск проектов...' search_value=query %}
    </form>
</div>

<div id="projects-container">
    {% include 'projects/partials/_projects_grid.html' %}
</div>
{% endblock %}
