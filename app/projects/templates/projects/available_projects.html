{% extends 'base.html' %}
{% block title %}Доступные проекты{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <h1 class="mb-0">Доступные проекты</h1>
    
    <form id="projects-search-form" 
          hx-get="{% url 'projects:available_projects' %}" 
          hx-target="#projects-container" 
          hx-swap="innerHTML"
          hx-trigger="keyup changed delay:400ms, search submit"
          class="position-relative style-search-form" style="max-width: 400px; width: 100%;">
        <div class="input-group input-group-sm">
            <span class="input-group-text bg-transparent border-end-0 text-muted">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" 
                   name="q" 
                   value="{{ query }}" 
                   class="form-control border-start-0 ps-0" 
                   placeholder="Поиск проектов..." 
                   aria-label="Поиск проектов">
        </div>
    </form>
</div>

<div id="projects-container">
    {% include 'projects/partials/_projects_grid.html' %}
</div>
{% endblock %}
