{% extends 'base.html' %}
{% block title %}Дашборд{% endblock %}
{% block navbar_left %}
<div id="dashboard-tabs" hx-swap-oob="innerHTML"></div>
    <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link {% if source == 'assigned' %}active{% endif %}"
                hx-get="{% url 'projects:dashboard' %}?source=assigned"
                hx-target="#task-list-inner"
                hx-swap="innerHTML"
                href="#">Мои задачи</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if source == 'available' %}active{% endif %}"
                hx-get="{% url 'projects:dashboard' %}?source=available"
                hx-target="#task-list-inner"
                hx-swap="innerHTML"
                href="#">Доступные задачи</a>
            </li>
    </ul>
</div>
{% endblock %}
{% block content %}
<h1>Дашборд</h1>
{% if invitations %}
    <div id="invitations-container">
        {% include 'projects/partials/_invitations.html' %}
    </div>
{% endif %}
<div id="tab-content"> 
    <div id="task-list-inner"
        hx-target="#task-list-inner"
        hx-get="{% url 'projects:dashboard' %}"
        hx-trigger="load"
        hx-swap="innerHTML">
    </div>
</div>
{% endblock %}
