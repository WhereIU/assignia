{% extends 'base.html' %}
{% block title %}Создать запрос: {{ project.name }}{% endblock %}
{% block content %}

<h1>Создать запрос</h1>
<p class="text-muted">Проект: {{ project.name }}</p>

<form hx-post="{% url 'projects:request_create_submit' username=project.owner.username slug=project.slug %}"
      hx-target="#request-form-container" hx-swap="outerHTML">
    {% csrf_token %}
    <div class="mb-3">
        <textarea class="form-control" name="description" rows="3" placeholder="Опишите проблему..."></textarea>
    </div>
    <button type="submit" class="btn btn-success btn-sm">Отправить</button>
    <button type="button" class="btn btn-outline-secondary btn-sm"
            hx-get="{% url 'projects:request_create_form_cancel' %}" hx-target="#request-form-container" hx-swap="innerHTML">
        Отмена
    </button>
</form>
{% endblock %}
