<table class="table table-striped align-middle">
    <thead>
        <tr>
            <th>Пользователь</th>
            <th>Роль</th>
            {% if actor_role == 'owner' or actor_role == 'admin' %}
                <th width="150">Действия</th>
            {% endif %}
        </tr>
    </thead>
    <tbody>
    {% for m in members %}
        {% include 'members/partials/_member_item.html' with m=m actor_role=actor_role %}
    {% endfor %}
    </tbody>
</table>
