{% for assignment in task.assignments.all %}
    <span class="badge bg-secondary me-1 mb-1">
        {{ assignment.user.username }}
        <button type="button"
                hx-post="{% url 'tasks:remove_assignee' task.pk %}"
                hx-vals='{"user_id": "{{ assignment.user.pk }}"}'
                hx-target="#selected-assignees"
                hx-swap="innerHTML"
                class="btn-close btn-close-white ms-1" aria-label="Удалить"
                style="font-size: 0.5rem;"></button>
    </span>
    <input type="hidden" name="assignee_ids" value="{{ assignment.user.pk }}">
{% empty %}
    <span class="text-muted small">нет</span>
{% endfor %}
