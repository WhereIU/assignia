<form hx-get="{{ request.path }}" hx-target="#{{ target_id }}" hx-swap="outerHTML" class="mb-3 mt-0">
    <div class="row g-2 align-items-center">
        <div class="col-auto">
            <select name="status" class="form-select form-select-sm">
                <option value="">Все статусы</option>
                <option value="new" {% if filters.status == "new" %}selected{% endif %}>Новая</option>
                <option value="pending" {% if filters.status == "pending" %}selected{% endif %}>На рассмотрении</option>
                <option value="in_progress" {% if filters.status == "in_progress" %}selected{% endif %}>В работе</option>
                <option value="done" {% if filters.status == "done" %}selected{% endif %}>Выполнена</option>
                <option value="cancelled" {% if filters.status == "cancelled" %}selected{% endif %}>Отменена</option>
            </select>
        </div>
        <div class="col-auto">
            <select name="priority" class="form-select form-select-sm">
                <option value="">Любой приоритет</option>
                <option value="5" {% if filters.priority == "5" %}selected{% endif %}>5 (критический)</option>
                <option value="4" {% if filters.priority == "4" %}selected{% endif %}>4</option>
                <option value="3" {% if filters.priority == "3" %}selected{% endif %}>3</option>
                <option value="2" {% if filters.priority == "2" %}selected{% endif %}>2</option>
                <option value="1" {% if filters.priority == "1" %}selected{% endif %}>1 (низкий)</option>
            </select>
        </div>
        <div class="col-auto">
            <select name="risk" class="form-select form-select-sm">
                <option value="">Любой риск</option>
                <option value="high" {% if filters.risk == "high" %}selected{% endif %}>Высокий (≥4)</option>
                <option value="low" {% if filters.risk == "low" %}selected{% endif %}>Низкий (≤3)</option>
            </select>
        </div>
        <div class="col-auto">
            <input type="text" name="q" class="form-control form-control-sm" placeholder="Поиск..." value="{{ filters.q }}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-secondary btn-sm">Применить</button>
        </div>
    </div>
    {% if source %}
    <input type="hidden" name="source" value="{{ source }}">
    {% endif %}
</form>

{% for task in tasks %}
    {% include 'tasks/partials/_task_item.html' with task=task show_take_button=show_take_button %}
{% empty %}
    <p>Задач не найдено.</p>
{% endfor %}
