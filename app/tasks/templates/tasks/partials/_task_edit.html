<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Редактирование задачи</h5>
    <button type="button" class="btn-close" aria-label="Закрыть"
            onclick="document.getElementById('task-edit-overlay'); this.closest('#task-edit-overlay').innerHTML='';"></button>
  </div>
  <form hx-post="{% url 'tasks:task_save' task.pk %}" hx-target="#task-main-card" hx-swap="outerHTML">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-bold">Название</label>
          <input type="text" name="title" class="form-control" value="{{ task.title }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Статус</label>
          <select name="status" class="form-select">
            {% for key, value in task.STATUS_CHOICES %}
              <option value="{{ key }}" {% if task.status == key %}selected{% endif %}>{{ value }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Приоритет</label>
          <select name="priority" class="form-select">
            {% for i in "12345" %}
              <option value="{{ i }}" {% if task.priority == i|add:"0" %}selected{% endif %}>{{ i }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Дедлайн</label>
          <input type="datetime-local" name="deadline" class="form-control" value="{{ task.deadline|date:'Y-m-d\TH:i' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Шанс риска (1-5)</label>
          <select name="risk_chance" class="form-select">
            {% for i in "12345" %}
              <option value="{{ i }}" {% if task.risk_chance == i|add:"0" %}selected{% endif %}>{{ i }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Последствия риска (1-5)</label>
          <select name="risk_impact" class="form-select">
            {% for i in "12345" %}
              <option value="{{ i }}" {% if task.risk_impact == i|add:"0" %}selected{% endif %}>{{ i }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
            <label class="form-label">Исполнители</label>
            <input type="text" class="form-control" name="assignee_search" placeholder="Поиск участника..."
                  hx-get="{% url 'tasks:member_search' task.pk %}"
                  hx-trigger="keyup changed delay:300ms"
                  hx-target="#assignee-search-results"
                  hx-swap="innerHTML"
                  value="">
            <div id="assignee-search-results" class="list-group mt-1"></div>
            <div id="selected-assignees" class="mt-2">
                {% include 'common/partials/_selected_assignees.html' with task=task %}
            </div>
        </div>
      <div class="col-12">
        <label class="form-label">Описание</label>
        <textarea name="description" class="form-control" rows="3">{{ task.description }}</textarea>
      </div>
      <div class="col-12">
          <label class="form-label">Направления</label>
          <input type="text" class="form-control" name="direction_search" placeholder="Поиск направления..."
                hx-get="{% url 'tasks:direction_search' task.pk %}"
                hx-trigger="keyup changed delay:300ms"
                hx-target="#direction-search-results"
                hx-swap="innerHTML"
                value="">
          <div id="direction-search-results" class="list-group mt-1"></div>
          <div id="selected-directions" class="mt-2">
              {% include 'common/partials/_selected_directions.html' with task=task %}
          </div>
      </div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button type="submit" class="btn btn-success">Сохранить</button>
      <button type="button" class="btn btn-outline-secondary" 
              onclick="document.getElementById('task-edit-overlay'); this.closest('#task-edit-overlay').innerHTML='';">
        Отмена
      </button>
    </div>
  </form>
</div>
