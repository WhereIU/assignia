<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>
        {% if is_tech_support %}Запросы проекта{% else %}Мои запросы{% endif %}
    </h2>
    <button class="btn btn-success btn-sm"
            hx-get="{% url 'tasks:request_create_form' username=project.owner.username slug=project.slug %}"
            hx-target="#request-form-container" hx-swap="innerHTML">
        <i class="bi bi-plus-lg"></i> Создать запрос
    </button>
</div>

<div class="position-relative">
    <div id="request-form-container"></div>

    {% if requests %}
        <div class="list-group">
            {% for req in requests %}
                {% include 'requests/partials/_request_item.html' with req=req project=project %}
            {% endfor %}
        </div>
    {% else %}
        <p>Нет запросов.</p>
    {% endif %}
</div>
