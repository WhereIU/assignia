<div class="card shadow-sm border-0 mb-4">
    <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div class="d-flex align-items-center gap-2">
                <div class="p-2 bg-success-subtle text-success rounded border border-success-subtle">
                    <i class="bi bi-kanban fs-5"></i>
                </div>
                <h3 class="h4 mb-0 fw-bold text-dark">Задачи проекта</h3>
            </div>
            
           <button  hx-get="{% url 'project_tasks:task_create' username=project.owner.username slug=project.slug %}"
                    hx-target="#modal-container"
                    class="btn btn-primary d-inline-flex align-items-center gap-2 px-3 shadow-sm fw-medium"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-container">
                <i class="bi bi-plus-lg"></i> Новая задача
            </button>
        </div>

        <form class="row g-2 mb-4 align-items-center" 
              hx-get="{% url 'project_tasks:tasks_tab' username=project.owner.username slug=project.slug %}"
              hx-target="#tasks-list-wrapper"
              hx-swap="innerHTML"
              hx-trigger="submit, change">
            
            <div class="col-md-3">
                <select name="status" class="form-select form-select-sm border rounded">
                    <option value="">Все статусы</option>
                    {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if filters.status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <select name="priority" class="form-select form-select-sm border rounded">
                    <option value="">Все приоритеты</option>
                    {% for value, label in priority_choices %}
                        <option value="{{ value }}" {% if filters.priority == value|stringformat:"s" %}selected{% endif %}>Приоритет: {{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <div class="input-group input-group-sm border rounded">
                    <span class="input-group-text bg-white border-0 text-muted"><i class="bi bi-search"></i></span>
                    <input type="text" name="q" value="{{ filters.q }}" 
                           class="form-control border-0 ps-0" 
                           placeholder="Поиск по названию или описанию...">
                    <button class="btn btn-primary btn-sm px-3 rounded-end" type="submit">Найти</button>
                </div>
            </div>
        </form>

        <div id="tasks-list-wrapper" 
             hx-get="{% url 'project_tasks:tasks_tab' username=project.owner.username slug=project.slug %}" 
             hx-trigger="tasksChanged from:body" 
             hx-target="this" 
             hx-swap="innerHTML">
            {% include 'tasks/partials/_tasks_list.html' %}
        </div>
    </div>
</div>
