<div class="card mb-4 position-relative" id="task-main-card">
  <div id="task-edit-overlay" class="task-edit-overlay"></div>
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start">
      <h1 class="card-title">{{ task.name }}</h1>
      {% if is_privileged %}
        <button hx-get="{% url 'project_tasks:task_edit' task_pk=task.pk %}"
                hx-target="#modal-container"
                class="btn btn-sm btn-outline-primary d-inline-flex align-items-center gap-1"
                data-bs-toggle="modal"
                data-bs-target="#modal-container">
            <i class="bi bi-pencil"></i> Редактировать задачу
        </button>
      {% endif %}
    </div>


    <div class="mt-3">
      {% if task.status == 'new' and not task.assignments.exists and user.is_authenticated and not is_privileged %}
        <button hx-post="{% url 'project_tasks:task_take' task.pk %}"
                hx-target="#task-main-card"
                hx-swap="outerHTML"
                class="btn btn-success">Взять</button>
      {% endif %}

      {% if is_privileged and not task.is_deleted %}
        <button hx-post="{% url 'project_tasks:task_delete' task.pk %}"
                hx-target="#task-main-card"
                hx-swap="innerHTML"
                class="btn btn-outline-danger btn-sm">Удалить</button>
      {% endif %}

      {% if is_privileged and task.is_deleted %}
        <button hx-post="{% url 'project_tasks:task_restore' task.pk %}"
                hx-target="#task-main-card"
                hx-swap="outerHTML"
                class="btn btn-outline-success btn-sm">Восстановить</button>
      {% endif %}
    </div>
  </div>
</div>
