<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Команды направления «{{ direction.name }}»</h5>
    <div>
        {% if not show_deleted %}
            <button class="btn btn-outline-secondary btn-sm"
                    hx-get="{% url 'teams:teams_tab' direction_pk=direction.pk %}?show_deleted=1"
                    hx-target="#tab-content" hx-swap="innerHTML">
                Показать удалённые
            </button>
        {% else %}
            <button class="btn btn-outline-secondary btn-sm"
                    hx-get="{% url 'teams:teams_tab' direction_pk=direction.pk %}"
                    hx-target="#tab-content" hx-swap="innerHTML">
                Скрыть удалённые
            </button>
        {% endif %}
        <button class="btn btn-success btn-sm ms-2"
                hx-get="{% url 'teams:team_create_form' direction_pk=direction.pk %}"
                hx-target="#team-form-container" hx-swap="innerHTML">
            <i class="bi bi-plus-lg"></i> Добавить команду
        </button>
    </div>
</div>

<div id="team-form-container"></div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead><tr><th>Название</th><th>Действия</th></tr></thead>
        <tbody>
        {% for team in teams %}
            <tr>
                <td>{{ team.name }}</td>
                <td>
                    <div class="d-flex gap-1">
                        {% if not show_deleted %}
                            <button class="btn btn-outline-secondary btn-sm"
                                    hx-get="{% url 'teams:team_edit_form' direction_pk=direction.pk team_pk=team.pk %}"
                                    hx-target="#team-form-container" hx-swap="innerHTML">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-sm"
                                    hx-post="{% url 'teams:team_delete' team_pk=team.pk %}"
                                    hx-target="#tab-content" hx-swap="innerHTML">
                                <i class="bi bi-trash"></i>
                            </button>
                        {% else %}
                            <button class="btn btn-outline-success btn-sm"
                                    hx-post="{% url 'teams:team_restore' team_pk=team.pk %}"
                                    hx-target="#tab-content" hx-swap="innerHTML">
                                <i class="bi bi-arrow-counterclockwise"></i> Восстановить
                            </button>
                        {% endif %}
                    </div>
                </td>
            </tr>
        {% empty %}
            <tr><td colspan="2">Нет команд</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
